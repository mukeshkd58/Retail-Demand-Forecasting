version: "3.9"

services:

  # ── Streamlit Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: retail_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Flask REST API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: retail_api
    command: >
      gunicorn
      --workers 4
      --bind 0.0.0.0:5000
      --timeout 120
      --access-logfile -
      "api.flask_api:create_app()"
    ports:
      - "5000:5000"
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Automated Pipeline (Cron) ──────────────────────────────────────────────
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: retail_scheduler
    command: python scripts/cron_job.py --scheduler
    volumes:
      - ../data:/app/data
      - ../models:/app/models
      - ../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - api

networks:
  default:
    name: retail_network
